name: Keep Render Awake

# Evita que el servicio gratuito de Render se duerma tras 15 min de inactividad.
# Hace ping al endpoint /health cada 5 minutos.
#
# Nota: los cron de GitHub Actions pueden retrasarse bajo carga, y GitHub
# desactiva los workflows programados tras 60 días sin actividad en el repo.
# Para máxima fiabilidad, complementa con UptimeRobot (https://uptimerobot.com)
# apuntando a la misma URL cada 5 minutos.

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}   # permite ejecutarlo manualmente desde la pestaña Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          URL="https://oncontrol-backend-api.onrender.com/health"
          echo "Pinging $URL"
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$URL" || echo "000")
          echo "HTTP status: $code"
          if [ "$code" = "200" ]; then
            echo "✅ Backend despierto."
          else
            echo "⚠️ Respuesta inesperada ($code). Render puede estar arrancando (cold start)."
          fi
